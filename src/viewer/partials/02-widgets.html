<div id="todo-widget" class="panel-card fixed bottom-6 right-6 z-30 w-[340px] rounded-xl flex flex-col overflow-hidden">
  <button id="todo-header" class="px-4 py-3 border-b panel-divider flex items-center justify-between text-left hover:bg-white/5">
    <div class="flex items-center gap-2">
      <svg id="todo-icon" class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      <h3 id="todo-title" class="font-bold text-accent text-[10px] uppercase tracking-[0.12em]">To-do</h3>
      <span id="todo-count" class="text-xs text-ink-400 font-medium"></span>
      <span id="todo-bubble-count" class="hidden"></span>
    </div>
    <svg id="todo-chevron" class="w-4 h-4 text-ink-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
  </button>
  <div id="todo-body" class="flex flex-col" style="max-height: 50vh;">
    <!-- Tabs generated by buildTodoFilterTabs() from the configured
         categories (atlas.toml [todo].categories) — nothing hardcoded. -->
    <div id="todo-filter" class="flex border-b panel-divider text-[11px] font-semibold uppercase tracking-[0.08em]"></div>
    <ul id="todo-list" class="flex-1 overflow-y-auto scrollbar-thin divide-y divide-white/5 min-h-[60px]"></ul>
    <div id="todo-controls" class="hidden px-3 py-1.5 border-t panel-divider flex justify-between items-center text-[11px]">
      <button id="todo-toggle-done" class="text-ink-400 hover:text-ink-100 flex items-center gap-1 transition">
        <svg id="todo-toggle-icon" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        <span id="todo-toggle-label">Afficher faits</span>
      </button>
      <button id="todo-clear-done" class="text-ink-500 hover:text-rose-400 transition" title="Supprimer toutes les t&acirc;ches faites" data-i18n-title="clearDoneTitle" data-i18n="clearDoneBtn">Vider faits</button>
    </div>
    <form id="todo-form" class="px-3 py-2.5 border-t panel-divider flex gap-2">
      <input id="todo-input" type="text" placeholder="Ajouter une t&acirc;che&hellip;" data-i18n-placeholder="todoAddPlaceholder" autocomplete="off"
        class="flex-1 px-3 py-1.5 text-sm bg-black/30 border subtle-border rounded-md text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent">
      <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded-md font-medium transition" title="Entr&eacute;e" data-i18n-title="enterKey">+</button>
    </form>
    <div id="todo-status" class="px-3 py-1.5 text-[10px] text-ink-500 border-t panel-divider flex justify-between"></div>
  </div>
</div>
