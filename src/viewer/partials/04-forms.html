<!-- Password reset modal (admin + cloud mode).
     Replaces the old browser native prompt: field + confirmation, show/hide
     toggle, live length validation, inline success feedback.
     role=dialog, close with Esc + backdrop click. -->
<div id="reset-pw-backdrop" class="hidden fixed inset-0 z-[60] overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="reset-pw-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-1">
      <h3 id="reset-pw-title" class="text-base font-semibold text-ink-100" data-i18n="settingsResetPasswordTitle">R&eacute;initialiser le mot de passe</h3>
      <button type="button" id="reset-pw-close" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" title="Fermer (Esc)" data-i18n-title="closeEsc">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <p class="text-xs text-ink-400 mb-4 leading-relaxed">
      <span data-i18n="settingsResetPasswordFor">Nouveau mot de passe pour</span>
      <span id="reset-pw-email" class="text-ink-200 font-medium"></span>
    </p>
    <form id="reset-pw-form" class="flex flex-col gap-3">
      <div>
        <label for="reset-pw-input" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="settingsNewPasswordLabel">Nouveau mot de passe</label>
        <div class="relative">
          <input id="reset-pw-input" type="password" autocomplete="new-password" data-i18n-placeholder="settingsPasswordPlaceholder" placeholder="8 car. min."
            class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm">
          <button type="button" id="reset-pw-toggle" class="absolute right-1 top-1/2 -translate-y-1/2 p-1.5 text-ink-500 hover:text-ink-200 rounded" title="Afficher / masquer" data-i18n-title="settingsTogglePassword" aria-pressed="false">
            <svg id="reset-pw-eye" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <svg id="reset-pw-eye-off" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
          </button>
        </div>
      </div>
      <div>
        <label for="reset-pw-confirm" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="settingsConfirmPasswordLabel">Confirmer le mot de passe</label>
        <input id="reset-pw-confirm" type="password" autocomplete="new-password" data-i18n-placeholder="settingsConfirmPasswordPlaceholder" placeholder="Saisir &agrave; nouveau"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm">
      </div>
      <p id="reset-pw-hint" class="text-xs text-ink-500" data-i18n="settingsPasswordRule">8 caract&egrave;res minimum.</p>
      <div id="reset-pw-error" class="hidden text-xs text-rose-300 bg-rose-500/10 border border-rose-500/25 rounded px-3 py-2"></div>
      <div id="reset-pw-success" class="hidden text-xs rounded px-3 py-2 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        <span data-i18n="settingsPasswordUpdated">Mot de passe mis &agrave; jour.</span>
      </div>
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" id="reset-pw-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" id="reset-pw-submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="settingsUpdatePassword">Mettre &agrave; jour</button>
      </div>
    </form>
  </div>
</div>

<div id="new-file-backdrop" class="hidden fixed inset-0 z-50 overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="new-file-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] max-h-[85vh] overflow-y-auto scrollbar-thin dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-4">
      <h3 id="new-file-title" class="text-base font-semibold text-ink-100" data-i18n="newDocHeader">Nouveau document</h3>
      <button type="button" id="new-file-close" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" data-i18n-title="closeEsc" title="Fermer (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="new-file-form" class="flex flex-col gap-3">
      <div>
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="folderLabel">Dossier</label>
        <input id="new-file-dir" placeholder="ex: notes/projets" data-i18n-placeholder="dirPlaceholder" autocomplete="off"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="visibilityLabel">Visibilit&eacute;</label>
        <div class="relative">
          <select id="new-file-visibility" class="w-full appearance-none px-3 pr-9 py-2 bg-navy-900 border subtle-border rounded text-ink-100 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm">
            <option value="private" data-i18n="visibilityPrivate">Priv&eacute; &mdash; moi seul</option>
            <option value="commons" data-i18n="visibilityCommons">Commun &mdash; toute l'&eacute;quipe</option>
          </select>
          <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="filenameLabel">Nom du fichier</label>
        <div class="flex items-center gap-2">
          <input id="new-file-name" placeholder="mon-document" autocomplete="off"
            class="flex-1 px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
          <span class="text-xs text-ink-500 font-mono">.md</span>
        </div>
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="templateLabel">Template</label>
        <div class="relative">
          <select id="new-file-template" class="w-full appearance-none px-3 pr-9 py-2 bg-navy-900 border subtle-border rounded text-ink-100 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm">
            <option value="blank" data-i18n="tplBlank">Vide</option>
            <!-- The document skeletons (DOC_TEMPLATES, injected at build time from
                 the engine's templates/ + <mind>/templates/) are inserted here by
                 populateTemplateOptions(); extensions add their own
                 via Atlas.registerTemplate. blank stays fixed. -->
          </select>
          <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <!-- Form blocks of extension templates (Atlas.registerTemplate
           with `block`): the viewer shows only the one of the selected template. -->
      <div id="new-file-ext-area" class="flex flex-col gap-3 empty:hidden"></div>
      <div id="new-file-error" class="text-xs text-rose-400 hidden"></div>
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" id="new-file-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="create">Cr&eacute;er</button>
      </div>
    </form>
  </div>
</div>

<div id="dir-rename-backdrop" class="hidden fixed inset-0 z-50 overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="dir-rename-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-1">
      <h3 id="dir-rename-title" class="text-base font-semibold text-ink-100" data-i18n="renameFolder">Renommer le dossier</h3>
      <button type="button" id="dir-rename-close" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" data-i18n-title="closeEsc" title="Fermer (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <p class="text-xs text-ink-400 mb-4"><span data-i18n="currentFolder">Dossier actuel :</span> <code id="dir-rename-current" class="text-ink-300"></code></p>
    <form id="dir-rename-form" class="flex flex-col gap-3">
      <div>
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="newNameLabel">Nouveau nom</label>
        <input id="dir-rename-input" autocomplete="off"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
        <p class="text-xs text-ink-500 mt-1" data-i18n="dirRenameNote">Tous les fichiers du dossier seront d&eacute;plac&eacute;s automatiquement.</p>
      </div>
      <div id="dir-rename-error" class="text-xs text-rose-400 hidden"></div>
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" id="dir-rename-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="menuRename">Renommer</button>
      </div>
    </form>
  </div>
</div>
