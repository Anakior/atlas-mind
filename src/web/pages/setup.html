<!DOCTYPE html>
<html lang="__LANG__"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0e0d12">
<meta name="robots" content="noindex, nofollow">
<title>__SITE_NAME__ — Setup</title>
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="stylesheet" href="/vendor/fonts.css">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  background:radial-gradient(ellipse 80% 60% at 70% 30%, rgba(29,155,209,0.12), transparent),radial-gradient(ellipse 60% 40% at 20% 80%, rgba(251,198,120,0.08), transparent),#0e0d12;
  color:#d1d2d3;font-family:Manrope,system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  width:100%;max-width:420px;padding:36px 32px 32px;
  background:rgba(35,34,42,0.55);
  backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
  border:1px solid rgba(255,255,255,0.1);border-radius:16px;
  box-shadow:0 18px 48px -12px rgba(0,0,0,0.65),inset 0 1px 0 rgba(255,255,255,0.08);
}
.logo-wrap{display:flex;justify-content:center;margin-bottom:18px}
.logo-wrap svg,.logo-wrap img{width:64px;height:64px;border-radius:12px;box-shadow:0 6px 24px -2px rgba(251,198,120,0.35)}
h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-0.015em;color:#fff;text-align:center;line-height:1.2}
h1 .atlas{font-family:'Lora',Georgia,serif;font-style:italic;font-weight:600;font-size:1.4em;color:#e8941c;text-shadow:0 1px 2px rgba(0,0,0,0.6),0 0 1px rgba(0,0,0,0.85);letter-spacing:0}
h1 .wordmark{display:inline-flex;align-items:center;gap:.35em;margin-left:.18em;line-height:1}
h1 .mind{position:relative;isolation:isolate;overflow:hidden;display:inline-block;font-family:'Manrope',system-ui,sans-serif;font-weight:700;font-size:0.42em;letter-spacing:0.16em;text-transform:uppercase;color:#eaf6fb;text-shadow:0 0 6px rgba(255,255,255,0.4);padding:0.28em 0.62em;border-radius:999px;border:1px solid rgba(124,200,235,0.38);box-shadow:inset 0 0 10px rgba(99,102,241,0.5),0 0 12px rgba(29,155,209,0.4);background:#080a14}
h1 .mind::before{content:"";position:absolute;inset:-100%;z-index:-2;background:radial-gradient(40% 62% at 25% 30%,rgba(139,148,255,0.92),transparent 60%),radial-gradient(46% 66% at 80% 70%,rgba(45,220,250,0.78),transparent 62%),radial-gradient(54% 74% at 60% 22%,rgba(40,170,225,0.68),transparent 66%);background-repeat:no-repeat;animation:nebulaA 10s linear infinite}
h1 .mind::after{content:"";position:absolute;inset:-100%;z-index:-1;background:radial-gradient(32% 52% at 72% 32%,rgba(120,225,255,0.7),transparent 60%),radial-gradient(36% 58% at 28% 76%,rgba(139,148,255,0.62),transparent 62%);background-repeat:no-repeat;mix-blend-mode:screen;animation:nebulaB 6.5s linear infinite}
@keyframes nebulaA{0%{transform:translate(-18%,-12%) scale(1.3)}25%{transform:translate(16%,-15%) scale(1.42)}50%{transform:translate(19%,14%) scale(1.3)}75%{transform:translate(-14%,17%) scale(1.44)}100%{transform:translate(-18%,-12%) scale(1.3)}}
@keyframes nebulaB{0%{transform:translate(16%,11%) scale(1.4);opacity:.45}33%{transform:translate(-14%,15%) scale(1.55);opacity:1}66%{transform:translate(-17%,-13%) scale(1.45);opacity:.8}100%{transform:translate(16%,11%) scale(1.4);opacity:.45}}
@media (prefers-reduced-motion:reduce){h1 .mind::before{animation:none}h1 .mind::after{animation:nebulaBreathe 6s ease-in-out infinite}@keyframes nebulaBreathe{0%,100%{opacity:.55}50%{opacity:1}}}
h1 .brand{font-family:'Corinthia',cursive;font-weight:700;font-size:1.7em;line-height:1;color:#eef0f2}
.subtitle{font-size:11px;color:#868a90;text-align:center;margin:6px 0 12px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600}
.intro{font-size:13px;color:#b0b1b5;text-align:center;margin:0 0 22px;line-height:1.5}
form{display:flex;flex-direction:column;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field > label{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#868a90}
input{
  padding:12px 14px;border:1px solid #2a2a32;background:rgba(0,0,0,0.3);
  color:#fff;border-radius:8px;font:inherit;font-size:14px;outline:none;
  transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;
}
input:focus{border-color:#1d9bd1;box-shadow:0 0 0 3px rgba(29,155,209,0.18);background:rgba(0,0,0,0.45)}
input::placeholder{color:#5e6066}
.token-input{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:0.02em}
.field-help{font-size:11.5px;color:#868a90;line-height:1.45;margin:0;display:flex;gap:7px;align-items:flex-start}
.field-help svg{width:14px;height:14px;flex-shrink:0;margin-top:1px;color:#fbc678;opacity:0.85}
.field-help code{color:#cbd0d6;background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;font-size:11px}
button{
  padding:12px 14px;margin-top:4px;background:#1d9bd1;color:white;border:0;border-radius:8px;
  font:inherit;font-size:14px;font-weight:600;cursor:pointer;
  transition:filter 0.12s,transform 0.06s;
}
button:hover{filter:brightness(1.1)}
button:active{transform:scale(0.98)}
.err{color:#fca5a5;font-size:13px;margin:0 0 14px;text-align:center;background:rgba(248,113,113,0.08);padding:9px 12px;border-radius:7px;border:1px solid rgba(248,113,113,0.22)}
</style></head><body>
<div class="card">
  <div class="logo-wrap">
    <img src="/icon.svg" alt="Atlas" width="64" height="64">
  </div>
  <h1><span class="brand">__SITE_PREFIX__</span> <span class="wordmark"><span class="atlas">Atlas</span><span class="mind">Mind</span></span></h1>
  <p class="subtitle">__SETUP_SUBTITLE__</p>
  <p class="intro">__SETUP_INTRO__</p>
  <form id="setup-form">
    __ERROR_HTML__
    <div class="field">
      <label for="setup-token">__TOKEN_LABEL__</label>
      <input id="setup-token" name="setup_token" class="token-input" type="text" placeholder="__TOKEN_PLACEHOLDER__" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" required autofocus>
      <p class="field-help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span>__TOKEN_HELP__</span></p>
    </div>
    <div class="field">
      <label for="setup-first-name">__FIRST_NAME_LABEL__</label>
      <input id="setup-first-name" name="first_name" type="text" placeholder="__FIRST_NAME_PLACEHOLDER__" autocomplete="given-name" maxlength="100">
    </div>
    <div class="field">
      <label for="setup-last-name">__LAST_NAME_LABEL__</label>
      <input id="setup-last-name" name="last_name" type="text" placeholder="__LAST_NAME_PLACEHOLDER__" autocomplete="family-name" maxlength="100">
    </div>
    <div class="field">
      <label for="setup-email">__EMAIL_LABEL__</label>
      <input id="setup-email" name="email" type="email" placeholder="__EMAIL_PLACEHOLDER__" autocomplete="username" required>
    </div>
    <div class="field">
      <label for="setup-password">__PASSWORD_LABEL__</label>
      <input id="setup-password" name="password" type="password" placeholder="__PASSWORD_PLACEHOLDER__" autocomplete="new-password" minlength="8" required>
    </div>
    <button type="submit">__SUBMIT_LABEL__</button>
  </form>
</div>
<script>
// Soumission en JSON (les endpoints admin exigent application/json + même
// origine). Pas de form action HTML : on POST en fetch same-origin.
document.getElementById('setup-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const form = e.target;
  const payload = {
    setup_token: form.setup_token.value,
    first_name: form.first_name.value,
    last_name: form.last_name.value,
    email: form.email.value,
    password: form.password.value,
  };
  const resp = await fetch('/api/setup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (resp.ok) { window.location = '/'; return; }
  let message = 'Error';
  try { message = (await resp.json()).error || message; } catch (_) {}
  let box = form.querySelector('.err');
  if (!box) { box = document.createElement('p'); box.className = 'err'; form.insertBefore(box, form.firstChild); }
  box.textContent = message;
});
</script>
</body></html>
