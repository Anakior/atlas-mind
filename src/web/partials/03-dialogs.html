<div id="quick-capture-backdrop" class="hidden fixed inset-0 z-50 overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="quick-capture-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] max-h-[85vh] overflow-y-auto scrollbar-thin dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-1">
      <h3 id="quick-capture-title" class="text-base font-semibold text-ink-100" data-i18n="quickCaptureTitle">Capture rapide</h3>
      <button type="button" id="quick-capture-close" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" data-i18n-title="closeEsc" title="Fermer (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <p class="text-xs text-ink-500 mb-3"><span data-i18n="quickCaptureHint">Cr&eacute;e une note dans</span> <code class="font-mono text-ink-400">inbox/</code></p>
    <form id="quick-capture-form" class="flex flex-col gap-3">
      <div>
        <label for="quick-capture-title" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="titleLabel">Titre</label>
        <input id="quick-capture-title" placeholder="Titre" data-i18n-placeholder="titlePlaceholder" required autocomplete="off"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm">
      </div>
      <div>
        <label for="quick-capture-body" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="bodyLabel">Corps</label>
        <textarea id="quick-capture-body" placeholder="(optionnel) corps de la note" data-i18n-placeholder="qcBodyPlaceholder" rows="5"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono resize-none"></textarea>
      </div>
      <div id="quick-capture-error" class="text-xs text-rose-400 hidden"></div>
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" id="quick-capture-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="save">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<div id="share-backdrop" class="hidden fixed inset-0 z-50 overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="share-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] max-w-[92vw] max-h-[85vh] overflow-y-auto scrollbar-thin dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-1">
      <h3 id="share-title" class="text-base font-semibold text-ink-100" data-i18n="shareModalTitle">Partager ce document</h3>
      <button type="button" id="share-close-x" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" data-i18n-title="closeEsc" title="Fermer (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <p id="share-path" class="text-xs text-ink-500 font-mono mb-4 truncate"></p>
    <div id="share-step1">
      <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-2 block" data-i18n="shareDuration">Dur&eacute;e de validit&eacute;</label>
      <div id="share-duration" class="grid grid-cols-4 gap-1.5 mb-4">
        <button data-days="1" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded">24h</button>
        <button data-days="7" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded" data-i18n="days7">7 jours</button>
        <button data-days="30" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded" data-i18n="days30">30 jours</button>
        <button data-days="0" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded" data-i18n="never">Jamais</button>
      </div>
      <div id="share-error" class="text-xs text-rose-400 hidden mb-2"></div>
      <div class="flex justify-end mt-4">
        <button id="share-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="close">Fermer</button>
      </div>
    </div>
    <div id="share-step2" class="hidden">
      <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-2 block" data-i18n="shareGenerated">Lien g&eacute;n&eacute;r&eacute;</label>
      <div class="flex gap-2 mb-3">
        <input id="share-url" readonly class="flex-1 px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-accent/40">
        <button id="share-copy" class="px-3 py-2 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="copy">Copier</button>
      </div>
      <p id="share-expiry" class="text-xs text-ink-500 mb-3"></p>
      <div class="flex justify-end gap-2">
        <button id="share-new" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="shareOther">Autre dur&eacute;e</button>
        <button id="share-close" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="done">Termin&eacute;</button>
      </div>
    </div>
    <div id="share-existing" class="mt-4 pt-4 border-t subtle-border hidden">
      <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-2 flex items-center justify-between">
        <span data-i18n="shareExistingHeader">Liens existants pour ce document</span>
        <span id="share-existing-count" class="text-ink-400 font-medium normal-case tracking-normal text-[10px]"></span>
      </label>
      <ul id="share-existing-list" class="space-y-1.5 max-h-40 overflow-y-auto scrollbar-thin"></ul>
    </div>
  </div>
</div>

<div id="rename-backdrop" class="hidden fixed inset-0 z-50 overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="rename-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] max-h-[85vh] overflow-y-auto scrollbar-thin dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-4">
      <h3 id="rename-title" class="text-base font-semibold text-ink-100">Renommer</h3>
      <button type="button" id="rename-close" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" data-i18n-title="closeEsc" title="Fermer (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="rename-form" class="flex flex-col gap-3">
      <div id="rename-dir-wrap">
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="folderLabel">Dossier</label>
        <input id="rename-dir" placeholder="ex: notes/projets" data-i18n-placeholder="dirPlaceholder" autocomplete="off"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
      </div>
      <div>
        <label class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="filenameLabel">Nom du fichier</label>
        <div class="flex items-center gap-2">
          <input id="rename-name" placeholder="nom-du-fichier" data-i18n-placeholder="filenamePlaceholder" autocomplete="off"
            class="flex-1 px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
          <span class="text-xs text-ink-500 font-mono">.md</span>
        </div>
      </div>
      <div id="rename-error" class="text-xs text-rose-400 hidden"></div>
      <div class="flex justify-end gap-2 mt-4">
        <button type="button" id="rename-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="validate">Valider</button>
      </div>
    </form>
  </div>
</div>

<div id="confirm-backdrop" class="hidden fixed inset-0 z-[60] overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="confirm-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] dialog-card rounded-xl p-5">
    <h3 id="confirm-title" class="text-base font-semibold text-ink-100 mb-2"></h3>
    <p id="confirm-message" class="text-sm text-ink-300 leading-relaxed mb-4"></p>
    <div class="flex justify-end gap-2">
      <button id="confirm-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded">Annuler</button>
      <button id="confirm-ok" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium">Confirmer</button>
    </div>
  </div>
</div>

<!-- Generic input modal (replaces the browser's native prompt). Used
     e.g. for the destination of "Appropriate". -->
<div id="prompt-backdrop" class="hidden fixed inset-0 z-[60] overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="prompt-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[24rem] max-w-[92vw] dialog-card rounded-xl p-5">
    <h3 id="prompt-title" class="text-base font-semibold text-ink-100 mb-2"></h3>
    <p id="prompt-message" class="text-sm text-ink-300 leading-relaxed mb-3"></p>
    <input id="prompt-input" type="text" autocomplete="off" class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono mb-4">
    <div class="flex justify-end gap-2">
      <button id="prompt-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
      <button id="prompt-ok" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="confirm">Confirmer</button>
    </div>
  </div>
</div>

<!-- Access & sharing (model B ACL): owner shares a doc with users/groups.
     Conforms to the dialog design system (labels, text-sm fields, select+chevron,
     header + close X, AtlasCombobox for the value field). -->
<div id="acl-backdrop" class="hidden fixed inset-0 z-50 overlay-backdrop">
  <div role="dialog" aria-modal="true" aria-labelledby="acl-title"
       class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[30rem] max-w-[92vw] max-h-[85vh] overflow-y-auto scrollbar-thin dialog-card rounded-xl p-5">
    <div class="flex items-start justify-between gap-3 mb-1">
      <h3 id="acl-title" class="text-base font-semibold text-ink-100" data-i18n="aclModalTitle">Acc&egrave;s &amp; partage</h3>
      <button type="button" id="acl-close-x" class="-mt-0.5 p-1 text-ink-400 hover:text-white rounded hover:bg-white/10" data-i18n-title="closeEsc" title="Fermer (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <p id="acl-path" class="text-xs text-ink-500 font-mono mb-2 truncate"></p>
    <div id="acl-status" class="text-xs mb-3"></div>
    <ul id="acl-grants" class="space-y-1.5 mb-4 max-h-48 overflow-y-auto scrollbar-thin"></ul>
    <div id="acl-manage" class="hidden">
      <form id="acl-grant-form" class="flex flex-col gap-3 mb-3">
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label for="acl-kind" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="aclKindLabel">Type</label>
            <div class="relative">
              <select id="acl-kind" class="w-full appearance-none px-3 pr-9 py-2 text-sm bg-navy-900 border subtle-border rounded text-ink-100 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent">
                <option value="user" data-i18n="aclKindUser">Personne</option>
                <option value="group" data-i18n="aclKindGroup">Groupe</option>
                <option value="*" data-i18n="aclKindAll">Tout le monde</option>
              </select>
              <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
          <div>
            <label for="acl-level" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="aclLevelLabel">Niveau</label>
            <div class="relative">
              <select id="acl-level" class="w-full appearance-none px-3 pr-9 py-2 text-sm bg-navy-900 border subtle-border rounded text-ink-100 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent">
                <option value="view" data-i18n="aclLevelView">Lecture</option>
                <option value="edit" data-i18n="aclLevelEdit">&Eacute;dition</option>
              </select>
              <svg class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
        </div>
        <div id="acl-value-wrap">
          <label for="acl-value" class="text-xs uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="aclValueLabel">Email ou groupe</label>
          <input id="acl-value" autocomplete="off" placeholder="email ou nom de groupe" data-i18n-placeholder="aclValuePlaceholder"
            class="w-full px-3 py-2 text-sm bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent">
        </div>
        <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="aclAdd">Ajouter</button>
      </form>
      <div id="acl-error" class="text-xs text-rose-400 hidden mb-2"></div>
      <div class="flex items-center gap-2 pt-3 border-t subtle-border">
        <button id="acl-make-private" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="aclMakePrivate">Rendre priv&eacute;</button>
        <button id="acl-make-commons" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="aclMakeCommons">Mettre en commun</button>
      </div>
      <p class="text-xs text-ink-500 mt-2" data-i18n="aclVisibilityHelp">Priv&eacute; = vous seul (+ les acc&egrave;s ci-dessus). Commun = visible par toute l'&eacute;quipe.</p>
    </div>
    <div class="flex justify-end gap-2 mt-4">
      <button id="acl-close" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="done">Termin&eacute;</button>
    </div>
  </div>
</div>
