<div id="quick-capture-backdrop" class="hidden fixed inset-0 z-50 bg-black/60 backdrop-blur-sm">
  <div class="absolute left-1/2 top-[12%] -translate-x-1/2 w-[92vw] max-w-md bg-navy-800 border subtle-border rounded-xl shadow-2xl shadow-black/70 p-5">
    <h3 class="text-base font-semibold text-ink-100 mb-1" data-i18n="quickCaptureTitle">Capture rapide</h3>
    <p class="text-xs text-ink-500 mb-3"><span data-i18n="quickCaptureHint">Cr&eacute;e une note dans</span> <code class="font-mono text-ink-400">inbox/</code></p>
    <form id="quick-capture-form" class="flex flex-col gap-3">
      <input id="quick-capture-title" placeholder="Titre" data-i18n-placeholder="titlePlaceholder" required autocomplete="off"
        class="w-full px-3 py-2.5 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-base">
      <textarea id="quick-capture-body" placeholder="(optionnel) corps de la note" data-i18n-placeholder="qcBodyPlaceholder" rows="5"
        class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono resize-none"></textarea>
      <div id="quick-capture-error" class="text-xs text-rose-400 hidden"></div>
      <div class="flex justify-end gap-2 mt-1">
        <button type="button" id="quick-capture-cancel" class="px-3 py-2 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" class="px-4 py-2 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="save">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<div id="share-backdrop" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm">
  <div class="absolute left-1/2 top-[18%] -translate-x-1/2 w-[28rem] max-w-[92vw] bg-navy-800 border subtle-border rounded-xl shadow-2xl shadow-black/70 p-5">
    <h3 class="text-base font-semibold text-ink-100 mb-1" data-i18n="shareModalTitle">Partager ce document</h3>
    <p id="share-path" class="text-[11px] text-ink-500 font-mono mb-4 truncate"></p>
    <div id="share-step1">
      <label class="text-[11px] uppercase tracking-wider text-ink-500 font-semibold mb-2 block" data-i18n="shareDuration">Dur&eacute;e de validit&eacute;</label>
      <div id="share-duration" class="grid grid-cols-4 gap-1.5 mb-4">
        <button data-days="1" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded">24h</button>
        <button data-days="7" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded" data-i18n="days7">7 jours</button>
        <button data-days="30" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded" data-i18n="days30">30 jours</button>
        <button data-days="0" class="share-dur px-2 py-1.5 text-xs bg-navy-700 hover:bg-navy-600 text-ink-200 border subtle-border rounded" data-i18n="never">Jamais</button>
      </div>
      <div id="share-error" class="text-xs text-rose-400 hidden mb-2"></div>
      <div class="flex justify-end">
        <button id="share-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="close">Fermer</button>
      </div>
    </div>
    <div id="share-step2" class="hidden">
      <label class="text-[11px] uppercase tracking-wider text-ink-500 font-semibold mb-2 block" data-i18n="shareGenerated">Lien g&eacute;n&eacute;r&eacute;</label>
      <div class="flex gap-2 mb-3">
        <input id="share-url" readonly class="flex-1 px-2 py-2 bg-navy-900 border subtle-border rounded text-ink-100 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-accent/40">
        <button id="share-copy" class="px-3 py-2 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="copy">Copier</button>
      </div>
      <p id="share-expiry" class="text-[11px] text-ink-500 mb-3"></p>
      <div class="flex justify-end gap-2">
        <button id="share-new" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="shareOther">Autre dur&eacute;e</button>
        <button id="share-close" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="done">Termin&eacute;</button>
      </div>
    </div>
    <div id="share-existing" class="mt-4 pt-4 border-t subtle-border hidden">
      <label class="text-[11px] uppercase tracking-wider text-ink-500 font-semibold mb-2 flex items-center justify-between">
        <span data-i18n="shareExistingHeader">Liens existants pour ce document</span>
        <span id="share-existing-count" class="text-ink-400 font-medium normal-case tracking-normal text-[10px]"></span>
      </label>
      <ul id="share-existing-list" class="space-y-1.5 max-h-40 overflow-y-auto scrollbar-thin"></ul>
    </div>
  </div>
</div>

<div id="rename-backdrop" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm">
  <div class="absolute left-1/2 top-[20%] -translate-x-1/2 w-96 max-w-[92vw] bg-navy-800 border subtle-border rounded-xl shadow-2xl shadow-black/70 p-5">
    <h3 id="rename-title" class="text-base font-semibold text-ink-100 mb-4">Renommer</h3>
    <form id="rename-form" class="flex flex-col gap-3">
      <div id="rename-dir-wrap">
        <label class="text-[11px] uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="folderLabel">Dossier</label>
        <input id="rename-dir" list="rename-dirs" placeholder="ex: notes/projets" data-i18n-placeholder="dirPlaceholder" autocomplete="off"
          class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
        <datalist id="rename-dirs"></datalist>
      </div>
      <div>
        <label class="text-[11px] uppercase tracking-wider text-ink-500 font-semibold mb-1 block" data-i18n="filenameLabel">Nom du fichier</label>
        <div class="flex items-center gap-2">
          <input id="rename-name" placeholder="nom-du-fichier" data-i18n-placeholder="filenamePlaceholder" autocomplete="off"
            class="flex-1 px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono">
          <span class="text-xs text-ink-500 font-mono">.md</span>
        </div>
      </div>
      <div id="rename-error" class="text-xs text-rose-400 hidden"></div>
      <div class="flex justify-end gap-2 mt-2">
        <button type="button" id="rename-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
        <button type="submit" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="validate">Valider</button>
      </div>
    </form>
  </div>
</div>

<div id="confirm-backdrop" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm">
  <div class="absolute left-1/2 top-[28%] -translate-x-1/2 w-96 max-w-[92vw] bg-navy-800 border subtle-border rounded-xl shadow-2xl shadow-black/70 p-5">
    <h3 id="confirm-title" class="text-base font-semibold text-ink-100 mb-2"></h3>
    <p id="confirm-message" class="text-sm text-ink-300 leading-relaxed mb-4"></p>
    <div class="flex justify-end gap-2">
      <button id="confirm-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded">Annuler</button>
      <button id="confirm-ok" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium">Confirmer</button>
    </div>
  </div>
</div>

<!-- Generic input modal (replaces the browser's native prompt). Used
     e.g. for the destination of "Appropriate". -->
<div id="prompt-backdrop" class="hidden fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm">
  <div class="absolute left-1/2 top-[28%] -translate-x-1/2 w-96 max-w-[92vw] bg-navy-800 border subtle-border rounded-xl shadow-2xl shadow-black/70 p-5">
    <h3 id="prompt-title" class="text-base font-semibold text-ink-100 mb-2"></h3>
    <p id="prompt-message" class="text-sm text-ink-300 leading-relaxed mb-3"></p>
    <input id="prompt-input" type="text" autocomplete="off" class="w-full px-3 py-2 bg-navy-900 border subtle-border rounded text-ink-100 placeholder-ink-500 focus:outline-none focus:ring-2 focus:ring-accent/40 focus:border-accent text-sm font-mono mb-4">
    <div class="flex justify-end gap-2">
      <button id="prompt-cancel" class="px-3 py-1.5 text-sm bg-navy-700 hover:bg-navy-600 text-ink-200 rounded" data-i18n="cancel">Annuler</button>
      <button id="prompt-ok" class="px-3 py-1.5 text-sm bg-accent hover:brightness-110 text-white rounded font-medium" data-i18n="confirm">Confirmer</button>
    </div>
  </div>
</div>
