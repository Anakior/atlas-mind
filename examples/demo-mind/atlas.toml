# Atlas mind configuration — demo mind shipped with the engine.
# This is the source for the public, static, offline demo published on GitHub
# Pages. It contains NO private data: every document is a self-referential
# showcase of what Atlas Mind can do.

prefix = ""
tagline = "A live, in-browser demo — your knowledge, your engine, your mind."
lang = "en"

[site]
# PUBLIC demo on GitHub Pages → emit canonical + Open Graph/Twitter card.
url = "https://atlas-mind.anakior.app/demo/"
description = "Live, in-browser demo of Atlas Mind — a self-hosted, git-native knowledge base and Notion / Obsidian Publish alternative, with an AI memory over MCP."
og_image = "https://atlas-mind.anakior.app/assets/mind-poster.jpg"

[build]
# Nothing to hide in the demo; the whole tree is meant to be browsed.
excluded_names = []
